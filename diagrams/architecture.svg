<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="Component architecture">
  <title>lovable-audit component architecture</title>
  <desc>How the four Python detectors compose into the CLI and how the Next.js demo depends on the templates.</desc>
  <style>
    .bg { fill: #ffffff; }
    .frame { fill: #ffffff; stroke: #94a3b8; stroke-width: 1; }
    .core { fill: #f8fafc; stroke: #1f2937; stroke-width: 1.25; }
    .ext { fill: #fff7ed; stroke: #9a3412; stroke-width: 1.25; }
    .demo { fill: #ecfeff; stroke: #0e7490; stroke-width: 1.25; }
    .title { font: 600 14px system-ui, sans-serif; fill: #0f172a; }
    .body { font: 12px system-ui, sans-serif; fill: #334155; }
    .small { font: 11px system-ui, sans-serif; fill: #475569; }
    .mono { font: 11px ui-monospace, monospace; fill: #475569; }
    .arrow { stroke: #1f2937; stroke-width: 1.25; fill: none; marker-end: url(#a); }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f2937" />
    </marker>
  </defs>
  <rect class="bg" width="880" height="420" />

  <text class="title" x="20" y="28">Component architecture</text>
  <text class="small" x="20" y="46">Static analysis in Python; UI demo in Next.js + TypeScript.</text>

  <!-- left frame: lovable_audit package -->
  <rect class="frame" x="20" y="70" width="440" height="320" rx="8" />
  <text class="mono" x="32" y="92">lovable_audit/</text>

  <g transform="translate(40,110)">
    <rect class="core" width="180" height="56" rx="6" />
    <text class="title" x="12" y="22">cli.py</text>
    <text class="body" x="12" y="40">argparse + dispatch</text>
  </g>
  <g transform="translate(40,180)">
    <rect class="core" width="180" height="56" rx="6" />
    <text class="title" x="12" y="22">risk_patterns.py</text>
    <text class="body" x="12" y="40">TS smells · error swallow</text>
  </g>
  <g transform="translate(40,250)">
    <rect class="core" width="180" height="56" rx="6" />
    <text class="title" x="12" y="22">security_checks.py</text>
    <text class="body" x="12" y="40">secrets · CORS · RLS</text>
  </g>
  <g transform="translate(250,110)">
    <rect class="core" width="190" height="56" rx="6" />
    <text class="title" x="12" y="22">architecture_checks.py</text>
    <text class="body" x="12" y="40">folders · cycles</text>
  </g>
  <g transform="translate(250,180)">
    <rect class="core" width="190" height="56" rx="6" />
    <text class="title" x="12" y="22">test_coverage.py</text>
    <text class="body" x="12" y="40">lcov · nyc · cobertura</text>
  </g>
  <g transform="translate(250,250)">
    <rect class="core" width="190" height="56" rx="6" />
    <text class="title" x="12" y="22">report.py</text>
    <text class="body" x="12" y="40">markdown emitter</text>
  </g>

  <!-- external -->
  <g transform="translate(140,330)">
    <rect class="ext" width="240" height="50" rx="6" />
    <text class="title" x="12" y="22">read-only · zero runtime deps</text>
    <text class="body" x="12" y="38">std lib only (re, pathlib, json, argparse)</text>
  </g>

  <path class="arrow" d="M130 166 H 130 180 V 196" />
  <path class="arrow" d="M130 236 H 130 180 V 266" />
  <path class="arrow" d="M345 138 H 345 V 196" />
  <path class="arrow" d="M345 208 H 345 V 266" />

  <!-- right frame: next_demo -->
  <rect class="frame" x="490" y="70" width="370" height="320" rx="8" />
  <text class="mono" x="502" y="92">next_demo/</text>

  <g transform="translate(500,110)">
    <rect class="demo" width="160" height="56" rx="6" />
    <text class="title" x="12" y="22">app/page.tsx</text>
    <text class="body" x="12" y="40">landing + audit steps</text>
  </g>
  <g transform="translate(680,110)">
    <rect class="demo" width="160" height="56" rx="6" />
    <text class="title" x="12" y="22">whatsapp-demo</text>
    <text class="body" x="12" y="40">bubble UI · send()</text>
  </g>
  <g transform="translate(500,180)">
    <rect class="demo" width="160" height="56" rx="6" />
    <text class="title" x="12" y="22">api/chat/route.ts</text>
    <text class="body" x="12" y="40">mocked LLM replies</text>
  </g>
  <g transform="translate(680,180)">
    <rect class="ext" width="160" height="56" rx="6" />
    <text class="title" x="12" y="22">templates/</text>
    <text class="body" x="12" y="40">risk · readiness · handoff</text>
  </g>
  <g transform="translate(500,250)">
    <rect class="demo" width="340" height="56" rx="6" />
    <text class="title" x="12" y="22">tests/ (Python)</text>
    <text class="body" x="12" y="40">unit tests for every detector + CLI entry point</text>
  </g>
  <g transform="translate(500,330)">
    <rect class="ext" width="340" height="50" rx="6" />
    <text class="title" x="12" y="22">scripts/</text>
    <text class="body" x="12" y="38">run_audit.sh · verify_stack.py · fixtures for demo</text>
  </g>

  <path class="arrow" d="M660 138 H 680 680 V 138" />
  <path class="arrow" d="M580 236 H 580 760 V 264" />
</svg>
